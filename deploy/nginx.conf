# /etc/nginx/sites-available/stablefold.conf
# Production nginx config for Stablefold landing
# Hardened: HTTP/2, gzip+brotli, edge caching, security headers, HSTS

# www → apex 301 redirect (canonical = no-www)
server {
    listen 80;
    listen [::]:80;
    server_name www.stablefold.com;
    return 301 https://stablefold.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.stablefold.com;

    ssl_certificate     /etc/letsencrypt/live/stablefold.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stablefold.com/privkey.pem;

    return 301 https://stablefold.com$request_uri;
}

# HTTP → HTTPS redirect for apex
server {
    listen 80;
    listen [::]:80;
    server_name stablefold.com;

    # Let's Encrypt ACME challenge (during initial issuance + renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stablefold.com;

    ssl_certificate     /etc/letsencrypt/live/stablefold.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stablefold.com/privkey.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_comp_level 6;

    # If brotli module is available (Hetzner default has nginx-extras)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    root /var/www/stablefold;
    index index.html;
    charset utf-8;

    # HTML — short cache, must-revalidate
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # Static assets — long cache, immutable
    location ~* \.(css|js|woff2?|jpg|jpeg|png|webp|avif|svg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Default location
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hide common probe paths
    location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; }
    location = /.env { deny all; access_log off; log_not_found off; }

    # Custom 404 → redirect to root for SPA-ish behavior (single-file site)
    error_page 404 = @notfound;
    location @notfound {
        return 302 /;
    }
}
