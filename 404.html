<style>
:root{
  --ink:#0B0D10; --slate:#13161B; --char:#1E2229; --bone:#EDE5D3;
  --bone-soft:#D8D1BF; --mute:#9A9286; --mute-soft:#8A8579; --brass:#B89968;
  --serif:"Fraunces","Times New Roman",serif;
  --sans:"Geist",system-ui,sans-serif;
  --mono:"Geist Mono",ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--ink);color:var(--bone);font-family:var(--sans);min-height:100vh}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 24px;
  background:
    radial-gradient(1000px 700px at 70% 20%, rgba(184,153,104,.12), transparent 60%),
    radial-gradient(700px 500px at 10% 80%, rgba(122,140,95,.06), transparent 60%),
    var(--ink);
  text-align:center;
}
.code{
  font-family:var(--mono);font-size:13px;letter-spacing:.18em;
  color:var(--brass);text-transform:uppercase;margin-bottom:32px;
}
.code::before{content:"§ ";color:var(--mute-soft)}
h1{
  font-family:var(--serif);font-weight:340;
  font-variation-settings:"opsz" 144,"SOFT" 50,"WONK" 0;
  font-size:clamp(56px, 12vw, 144px);line-height:.96;letter-spacing:-0.04em;
  margin-bottom:24px;color:var(--bone);
}
h1 em{
  font-style:italic;
  font-variation-settings:"opsz" 144,"SOFT" 100,"WONK" 1;
  color:var(--brass);font-weight:380;
}
p{
  max-width:46ch;font-size:17px;line-height:1.55;color:var(--bone-soft);
  margin-bottom:36px;
}
.actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
a.btn{
  display:inline-flex;align-items:center;gap:12px;
  padding:16px 22px;font-size:14.5px;font-weight:500;letter-spacing:-0.005em;
  border-radius:1px;text-decoration:none;
  transition:transform .25s ease, background .25s ease, color .25s ease, border-color .25s ease;
  min-height:54px;
}
.btn-primary{background:var(--brass);color:var(--ink);border:1px solid var(--brass)}
.btn-primary:hover{background:var(--bone);border-color:var(--bone);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--bone);border:1px solid var(--char)}
.btn-ghost:hover{border-color:var(--brass);color:var(--brass)}
.foot{
  margin-top:64px;font-family:var(--mono);font-size:11px;color:var(--mute-soft);
  letter-spacing:.04em;
}
</style>
</head>
<body>
  <div class="code">404 · ничего нет по этому адресу</div>
  <h1>Страница <em>выпала</em><br>из обращения.</h1>
  <p>
    Возможно, ссылка устарела или вы попали сюда по неверному адресу.
    Стейблкоины тоже иногда теряются — это нормально, главное знать куда вернуться.
  </p>
  <div class="actions">
    <a href="./" class="btn btn-primary">
      На главную
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7h12M8 2l5 5-5 5" stroke="currentColor" stroke-width="1.4"/></svg>
    </a>
    <a href="./#mechanism" class="btn btn-ghost">
      Как зарабатывает скринер
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4l5 6 5-6" stroke="currentColor" stroke-width="1.4"/></svg>
    </a>
  </div>
  <div class="foot">Stablefold Operator Track</div>
</body>
</html>
